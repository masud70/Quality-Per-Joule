<svg width="680" height="1080" viewBox="0 0 680 1080" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Helvetica Neue', Arial, sans-serif; }
  .t { font-size: 14px; fill: #1d1d1b; font-weight: 400; }
  .ts { font-size: 12px; fill: #73726c; font-weight: 400; }
  .th { font-size: 14px; fill: #1d1d1b; font-weight: 500; }
  .arr { stroke: #73726c; stroke-width: 1.5; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; } .c-coral .th { fill: #712B13; } .c-coral .ts { fill: #993C1D; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber .th { fill: #633806; } .c-amber .ts { fill: #854F0B; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green .th { fill: #27500A; } .c-green .ts { fill: #3B6D11; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray .th { fill: #444441; } .c-gray .ts { fill: #5F5E5A; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="1080" fill="white"/>

<!-- STAGE 1 -->
<g class="c-blue">
  <rect x="220" y="30" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Stage 1: Data preparation</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">CelebA (218×178×3), normalize [-1,1]</text>
</g>
<line x1="340" y1="86" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 2 -->
<g class="c-blue">
  <rect x="190" y="120" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Stage 2: Preprocessing</text>
  <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">CenterCrop(178) → Resize(32) → ToTensor</text>
</g>
<line x1="340" y1="176" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 3 -->
<g class="c-teal">
  <rect x="130" y="210" width="420" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">Stage 3: Model training (30 epochs, bs=64)</text>
  <text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">Sequential, 10s idle gap between models</text>
</g>

<!-- Energy tracking box -->
<g class="c-coral">
  <rect x="590" y="171" width="76" height="148" rx="6" stroke-width="0.5" stroke-dasharray="4 2"/>
</g>
<g transform="rotate(-90,628,245)">
  <text class="ts" x="628" y="237" text-anchor="middle" dominant-baseline="central">CodeCarbon + NVML</text>
  <text class="ts" x="628" y="253" text-anchor="middle" dominant-baseline="central">energy tracking</text>
</g>
<line x1="590" y1="238" x2="550" y2="238" class="arr" marker-end="url(#arrow)"/>

<!-- Fan-out -->
<line x1="148" y1="266" x2="108" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="266" x2="224" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="266" x2="340" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="266" x2="456" y2="330" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="266" x2="548" y2="330" class="arr" marker-end="url(#arrow)"/>

<!-- 5 MODEL BOXES -->
<g class="c-purple">
  <rect x="58" y="332" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="108" y="352" text-anchor="middle" dominant-baseline="central">AE</text>
  <text class="ts" x="108" y="370" text-anchor="middle" dominant-baseline="central">1.13M</text>
</g>
<g class="c-purple">
  <rect x="174" y="332" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="224" y="352" text-anchor="middle" dominant-baseline="central">VAE</text>
  <text class="ts" x="224" y="370" text-anchor="middle" dominant-baseline="central">1.65M</text>
</g>
<g class="c-purple">
  <rect x="290" y="332" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="352" text-anchor="middle" dominant-baseline="central">DCGAN</text>
  <text class="ts" x="340" y="370" text-anchor="middle" dominant-baseline="central">3.59M</text>
</g>
<g class="c-purple">
  <rect x="406" y="332" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="456" y="352" text-anchor="middle" dominant-baseline="central">WGAN-GP</text>
  <text class="ts" x="456" y="370" text-anchor="middle" dominant-baseline="central">5.21M</text>
</g>
<g class="c-purple">
  <rect x="522" y="332" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="572" y="352" text-anchor="middle" dominant-baseline="central">DDPM</text>
  <text class="ts" x="572" y="370" text-anchor="middle" dominant-baseline="central">15.82M</text>
</g>

<!-- Fan-in -->
<line x1="108" y1="388" x2="108" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="224" y1="388" x2="224" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="340" y1="388" x2="340" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="456" y1="388" x2="456" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="572" y1="388" x2="572" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="108" y1="414" x2="572" y2="414" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="340" y1="414" x2="340" y2="440" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 4 -->
<g class="c-teal">
  <rect x="165" y="442" width="350" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="464" text-anchor="middle" dominant-baseline="central">Stage 4: Outputs per model</text>
</g>
<line x1="240" y1="486" x2="190" y2="518" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="486" x2="490" y2="518" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="100" y="520" width="180" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="190" y="540" text-anchor="middle" dominant-baseline="central">Trained checkpoints</text>
  <text class="ts" x="190" y="558" text-anchor="middle" dominant-baseline="central">model_final.pt × 5</text>
</g>
<g class="c-coral">
  <rect x="400" y="520" width="180" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="490" y="540" text-anchor="middle" dominant-baseline="central">Energy logs</text>
  <text class="ts" x="490" y="558" text-anchor="middle" dominant-baseline="central">Per-epoch J, W, s, CO₂</text>
</g>

<line x1="190" y1="576" x2="190" y2="600" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="490" y1="576" x2="490" y2="600" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="190" y1="600" x2="490" y2="600" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="340" y1="600" x2="340" y2="626" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 5 -->
<g class="c-green">
  <rect x="165" y="628" width="350" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="648" text-anchor="middle" dominant-baseline="central">Stage 5: Evaluation</text>
  <text class="ts" x="340" y="666" text-anchor="middle" dominant-baseline="central">Generate 10K samples → FID (Inception-v3)</text>
</g>
<line x1="340" y1="684" x2="340" y2="716" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 6 -->
<g class="c-green">
  <rect x="165" y="718" width="350" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="738" text-anchor="middle" dominant-baseline="central">Stage 6: Metric computation</text>
  <text class="ts" x="340" y="756" text-anchor="middle" dominant-baseline="central">QpJ = 1 / (FID × Energy)</text>
</g>
<line x1="340" y1="774" x2="340" y2="806" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 7 -->
<g class="c-amber">
  <rect x="130" y="808" width="420" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="830" text-anchor="middle" dominant-baseline="central">Stage 7: Comparative analysis</text>
</g>
<line x1="170" y1="852" x2="116" y2="886" class="arr" marker-end="url(#arrow)"/>
<line x1="280" y1="852" x2="258" y2="886" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="852" x2="412" y2="886" class="arr" marker-end="url(#arrow)"/>
<line x1="510" y1="852" x2="556" y2="886" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
  <rect x="50" y="888" width="130" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="115" y="908" text-anchor="middle" dominant-baseline="central">Loss curves</text>
  <text class="ts" x="115" y="926" text-anchor="middle" dominant-baseline="central">Training dynamics</text>
</g>
<g class="c-gray">
  <rect x="196" y="888" width="130" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="261" y="908" text-anchor="middle" dominant-baseline="central">FID vs. energy</text>
  <text class="ts" x="261" y="926" text-anchor="middle" dominant-baseline="central">Trade-off scatter</text>
</g>
<g class="c-gray">
  <rect x="346" y="888" width="130" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="411" y="908" text-anchor="middle" dominant-baseline="central">QpJ ranking</text>
  <text class="ts" x="411" y="926" text-anchor="middle" dominant-baseline="central">Efficiency bar chart</text>
</g>
<g class="c-gray">
  <rect x="496" y="888" width="130" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="561" y="908" text-anchor="middle" dominant-baseline="central">Energy profile</text>
  <text class="ts" x="561" y="926" text-anchor="middle" dominant-baseline="central">Cumulative kJ</text>
</g>

<line x1="115" y1="944" x2="115" y2="966" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="261" y1="944" x2="261" y2="966" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="411" y1="944" x2="411" y2="966" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="561" y1="944" x2="561" y2="966" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="115" y1="966" x2="561" y2="966" stroke="#9c9a92" stroke-width="0.5"/>
<line x1="340" y1="966" x2="340" y2="990" class="arr" marker-end="url(#arrow)"/>

<!-- FINAL OUTPUT -->
<g class="c-teal">
  <rect x="165" y="992" width="350" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="1012" text-anchor="middle" dominant-baseline="central">Summary dashboard</text>
  <text class="ts" x="340" y="1030" text-anchor="middle" dominant-baseline="central">Full evaluation report + visualizations</text>
</g>

<text class="ts" x="340" y="1068" text-anchor="middle" dominant-baseline="central">Quality per Joule — full experimental pipeline</text>
</svg>
